services:
  - type: web
    name: player-dashboard
    env: node
    buildCommand: npm ci && npm run build && npm prune --omit=dev
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_SECRET_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: REACT_APP_RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOADS_FOLDER
        value: playerdashboard/uploads
      - key: CLOUDINARY_SCREENSHOTS_FOLDER
        value: playerdashboard/screenshots
      - key: ALLOWED_ORIGINS
        value: https://displaybeheer.nl,https://www.displaybeheer.nl,https://player-dashboard.onrender.com
      - key: BASE_URL
        value: https://www.displaybeheer.nl
      - key: CSP_CONNECT_SRC
        value: https://displaybeheer.nl,https://www.displaybeheer.nl,wss://displaybeheer.nl,wss://www.displaybeheer.nl,https://player-dashboard.onrender.com,wss://player-dashboard.onrender.com,https://www.google.com,https://www.gstatic.com,https://www.recaptcha.net
      - key: CORS_MAX_AGE
        value: "86400"
    healthCheckPath: /api/ping
    autoDeploy: true
